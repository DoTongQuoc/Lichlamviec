<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lịch làm việc Quán Cafe Ha my</title>
  <!-- html2canvas để chụp ảnh -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a1a1a;
      --bg: #ffffff;
      --bg2: #f6f6f6;
      --border: #e5e5e5;
      --border2: #d0d0d0;
      --text: #1a1a1a;
      --text2: #666;
      --text3: #aaa;
      --today: #185FA5;
      --radius: 8px;
      --morning-bg: #FAEEDA; --morning-tx: #854F0B;
      --afternoon-bg: #EAF3DE; --afternoon-tx: #3B6D11;
      --evening-bg: #E6F1FB; --evening-tx: #185FA5;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; min-height: 100vh; }
    .container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }

    /* TOP BAR */
    .topbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 1.25rem; }
    .app-title { font-size: 20px; font-weight: 600; color: var(--text); }
    .app-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    /* BUTTONS */
    .btn { padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit; transition: background .15s; }
    .btn:hover { background: var(--bg2); }
    .btn-primary { background: var(--primary); color: #fff; border-color: transparent; }
    .btn-primary:hover { background: #333; }
    .btn-danger { color: #A32D2D; border-color: #f7c1c1; }
    .btn-danger:hover { background: #fcebeb; }
    .btn-export { background: #185FA5; color: #fff; border-color: transparent; }
    .btn-export:hover { background: #1250a0; }

    /* TABS */
    .tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: var(--radius); padding: 4px; margin-bottom: 1.25rem; }
    .tab { flex: 1; padding: 7px 0; text-align: center; font-size: 13px; border-radius: 6px; cursor: pointer; color: var(--text2); border: none; background: transparent; font-family: inherit; }
    .tab.active { background: var(--bg); color: var(--text); font-weight: 500; border: 1px solid var(--border); }

    /* CARD */
    .card { background: var(--bg); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 1rem; }

    /* NAV ROW */
    .nav-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .nav-label { font-size: 14px; font-weight: 500; }

    /* LEGEND */
    .legend { display: flex; gap: 16px; margin-bottom: 1rem; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* SCHEDULE GRID */
    .schedule-grid { width: 100%; overflow-x: auto; }
    .sg-inner { min-width: 600px; }
    .sg-header { display: grid; grid-template-columns: 86px repeat(7, 1fr); background: var(--bg2); border-bottom: 1px solid var(--border); }
    .sg-hcell { padding: 9px 4px; font-size: 11px; color: var(--text2); text-align: center; border-right: 1px solid var(--border); }
    .sg-hcell:last-child { border-right: none; }
    .sg-hcell.is-today { color: var(--today); font-weight: 600; }
    .sg-row { display: grid; grid-template-columns: 86px repeat(7, 1fr); border-top: 1px solid var(--border); }
    .sg-label { padding: 10px 8px; font-size: 12px; font-weight: 600; color: var(--text2); display: flex; flex-direction: column; justify-content: center; border-right: 1px solid var(--border); background: var(--bg2); }
    .sg-label small { font-size: 10px; font-weight: 400; color: var(--text3); margin-top: 2px; }
    .sg-cell { padding: 5px 4px; border-right: 1px solid var(--border); min-height: 86px; display: flex; flex-direction: column; gap: 3px; }
    .sg-cell:last-child { border-right: none; }
    .sg-cell.is-today { background: rgba(24,95,165,0.04); }

    /* CHIPS */
    .chip { border-radius: 4px; padding: 3px 6px; font-size: 11px; font-weight: 500; display: flex; flex-direction: column; gap: 1px; }
    .chip-top { display: flex; align-items: center; justify-content: space-between; gap: 3px; }
    .chip-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip-rm { cursor: pointer; opacity: .5; font-size: 10px; background: none; border: none; color: inherit; padding: 0 1px; line-height: 1; font-family: inherit; }
    .chip-rm:hover { opacity: 1; }
    .chip-time { font-size: 10px; opacity: .7; font-weight: 400; }
    .chip.morning { background: var(--morning-bg); color: var(--morning-tx); }
    .chip.afternoon { background: var(--afternoon-bg); color: var(--afternoon-tx); }
    .chip.evening { background: var(--evening-bg); color: var(--evening-tx); }
    .add-slot { font-size: 11px; color: var(--text3); border: 1px dashed var(--border2); border-radius: 4px; padding: 3px 5px; cursor: pointer; background: none; text-align: left; width: 100%; font-family: inherit; }
    .add-slot:hover { color: var(--text); border-color: var(--border2); background: var(--bg2); }

    /* MONTH GRID */
    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 1rem; }
    .month-day-hd { text-align: center; font-size: 11px; color: var(--text2); padding: 4px 0; font-weight: 500; }
    .month-day { border: 1px solid var(--border); border-radius: 6px; padding: 6px 5px; min-height: 50px; background: var(--bg); }
    .month-day.is-today { border-color: var(--today); background: rgba(24,95,165,0.04); }
    .month-day .day-num { font-size: 12px; }
    .month-day.is-today .day-num { color: var(--today); font-weight: 600; }
    .month-day .day-ca { font-size: 10px; color: var(--text3); margin-top: 3px; }

    /* STAFF */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
    .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 14px; border: 1px solid var(--border); }
    .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 600; color: var(--text); }
    .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 1rem; }
    .staff-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .s-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .s-name { font-size: 13px; font-weight: 500; }
    .s-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* MODAL */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
    .overlay.open { display: flex; }
    .modal { background: var(--bg); border-radius: 14px; border: 1px solid var(--border); padding: 1.5rem; width: 100%; max-width: 320px; }
    .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .field input, .field select { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border2); font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); }
    .field-row { display: flex; gap: 8px; }
    .field-row .field { flex: 1; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }

    /* EXPORT MODAL */
    .export-modal { background: var(--bg); border-radius: 14px; border: 1px solid var(--border); padding: 1.5rem; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
    .export-modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
    #preview-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 1rem; min-height: 120px; display: flex; align-items: center; justify-content: center; background: var(--bg2); }
    #preview-img { width: 100%; display: none; }
    .loading-msg { font-size: 13px; color: var(--text2); padding: 2rem; text-align: center; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* PRINT CANVAS (ẩn, chỉ để render) */
    #print-canvas-wrap { position: absolute; left: -9999px; top: 0; }
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <div class="app-title">☕ Lịch làm việc</div>
      <div class="app-sub" id="week-sub"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-export" onclick="openExport()">📷 Lưu ảnh lịch</button>
      <button class="btn btn-primary" onclick="openModal('modal-staff')">+ Nhân viên</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('week', this)">Theo tuần</button>
    <button class="tab" onclick="switchTab('month', this)">Theo tháng</button>
    <button class="tab" onclick="switchTab('staff', this)">Nhân viên</button>
  </div>

  <!-- WEEK -->
  <div id="view-week">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>Ca sáng 7:00–11:00</div>
      <div class="legend-item"><div class="legend-dot" style="background:#97C459"></div>Ca chiều 13:00–17:00</div>
      <div class="legend-item"><div class="legend-dot" style="background:#85B7EB"></div>Ca tối 18:00–22:00</div>
    </div>
    <div class="nav-row">
      <button class="btn" onclick="prevWeek()">← Tuần trước</button>
      <span class="nav-label" id="week-label"></span>
      <button class="btn" onclick="nextWeek()">Tuần sau →</button>
    </div>
    <div class="card">
      <div class="schedule-grid">
        <div class="sg-inner">
          <div class="sg-header">
            <div class="sg-hcell">Ca</div>
            <div class="sg-hcell" id="h0"></div><div class="sg-hcell" id="h1"></div>
            <div class="sg-hcell" id="h2"></div><div class="sg-hcell" id="h3"></div>
            <div class="sg-hcell" id="h4"></div><div class="sg-hcell" id="h5"></div>
            <div class="sg-hcell" id="h6"></div>
          </div>
          <div class="sg-row" id="row-morning"><div class="sg-label">Sáng<small>7:00–11:00</small></div></div>
          <div class="sg-row" id="row-afternoon"><div class="sg-label">Chiều<small>13:00–17:00</small></div></div>
          <div class="sg-row" id="row-evening"><div class="sg-label">Tối<small>18:00–22:00</small></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MONTH -->
  <div id="view-month" style="display:none">
    <div class="nav-row">
      <button class="btn" onclick="prevMonth()">← Tháng trước</button>
      <span class="nav-label" id="month-label"></span>
      <button class="btn" onclick="nextMonth()">Tháng sau →</button>
    </div>
    <div class="card">
      <div class="month-grid" id="month-grid"></div>
    </div>
  </div>

  <!-- STAFF -->
  <div id="view-staff" style="display:none">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Tổng nhân viên</div><div class="stat-value" id="st-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Ca đã xếp tuần này</div><div class="stat-value" id="st-shifts">0</div></div>
      <div class="stat-card"><div class="stat-label">Ca thiếu người</div><div class="stat-value" id="st-missing">0</div></div>
    </div>
    <div class="staff-grid" id="staff-grid"></div>
    <button class="btn" onclick="openModal('modal-staff')">+ Thêm nhân viên</button>
  </div>
</div>

<!-- Modal: Thêm nhân viên -->
<div class="overlay" id="modal-staff">
  <div class="modal">
    <h3>Thêm nhân viên</h3>
    <div class="field"><label>Tên nhân viên</label><input id="inp-name" type="text" placeholder="Nguyễn Văn A"/></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModals()">Hủy</button>
      <button class="btn btn-primary" onclick="addStaff()">Thêm</button>
    </div>
  </div>
</div>

<!-- Modal: Phân công ca -->
<div class="overlay" id="modal-assign">
  <div class="modal">
    <h3>Phân công ca</h3>
    <div class="field"><label>Nhân viên</label><select id="inp-assign-staff"></select></div>
    <div class="field-row">
      <div class="field"><label>Từ</label><input id="inp-from" type="time"/></div>
      <div class="field"><label>Đến</label><input id="inp-to" type="time"/></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModals()">Hủy</button>
      <button class="btn btn-primary" onclick="confirmAssign()">Xác nhận</button>
    </div>
  </div>
</div>

<!-- Modal: Xuất ảnh -->
<div class="overlay" id="modal-export">
  <div class="export-modal">
    <h3>📷 Lưu ảnh lịch làm việc</h3>
    <div id="preview-wrap">
      <div class="loading-msg" id="loading-msg"><span class="spinner"></span>Đang tạo ảnh...</div>
      <img id="preview-img" alt="preview"/>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModals()">Đóng</button>
      <a id="download-link" class="btn btn-export" style="text-decoration:none;display:none;">💾 Tải ảnh xuống</a>
    </div>
  </div>
</div>

<!-- Canvas dùng để render ảnh (ẩn) -->
<div id="print-canvas-wrap"></div>

<script>
// ===================== DATA =====================
const DAYS_SHORT = ['CN','T2','T3','T4','T5','T6','T7'];
const SHIFTS = ['morning','afternoon','evening'];
const SHIFT_LABEL = { morning: 'Sáng', afternoon: 'Chiều', evening: 'Tối' };
const SHIFT_TIME  = { morning: '7:00–11:00', afternoon: '13:00–17:00', evening: '18:00–22:00' };
const SHIFT_DEF   = { morning: {from:'07:00',to:'11:00'}, afternoon: {from:'13:00',to:'17:00'}, evening: {from:'18:00',to:'22:00'} };
const AV_BG = ['#EEEDFE','#E1F5EE','#FAECE7','#E6F1FB','#FAEEDA','#FBEAF0'];
const AV_TX = ['#3C3489','#085041','#993C1D','#0C447C','#633806','#72243E'];

let staff = [
  {id:1, name:'Minh Anh'},
  {id:2, name:'Tuấn Kiệt'},
  {id:3, name:'Bảo Ngọc'},
  {id:4, name:'Hữu Đức'},
  {id:5, name:'Thu Hà'},
];
let nextId = 6;
let schedule = {}; // { dateKey: { morning:[{staffId,from,to}], ... } }
let weekOffset = 0, monthOffset = 0;
let assignTarget = null;

// ===================== HELPERS =====================
function dateKey(d) { return d.toISOString().slice(0,10); }
function fmtDate(d) { return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`; }
function getWeekDays(off) {
  const now = new Date(), day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day===0?6:day-1) + off*7);
  mon.setHours(0,0,0,0);
  return Array.from({length:7}, (_,i) => { const d=new Date(mon); d.setDate(d.getDate()+i); return d; });
}

function initWeek(days) {
  days.forEach(d => {
    const k = dateKey(d);
    if (!schedule[k]) {
      schedule[k] = { morning:[], afternoon:[], evening:[] };
      SHIFTS.forEach(sh => {
        const def = SHIFT_DEF[sh];
        staff.slice(0,2).forEach(s => schedule[k][sh].push({staffId:s.id, from:def.from, to:def.to}));
      });
    }
  });
}

// ===================== RENDER WEEK =====================
function renderWeek() {
  const days = getWeekDays(weekOffset);
  initWeek(days);
  const today = new Date(); today.setHours(0,0,0,0);
  document.getElementById('week-label').textContent = `${fmtDate(days[0])} – ${fmtDate(days[6])}`;
  document.getElementById('week-sub').textContent = weekOffset===0 ? 'Tuần này' : weekOffset<0 ? `${Math.abs(weekOffset)} tuần trước` : `${weekOffset} tuần sau`;

  days.forEach((d,i) => {
    const el = document.getElementById('h'+i);
    const isToday = d.getTime()===today.getTime();
    el.textContent = DAYS_SHORT[d.getDay()] + ' ' + d.getDate();
    el.className = 'sg-hcell' + (isToday?' is-today':'');
  });

  SHIFTS.forEach(sh => {
    const row = document.getElementById('row-'+sh);
    row.querySelectorAll('.sg-cell').forEach(e=>e.remove());
    days.forEach((d,i) => {
      const isToday = d.getTime()===today.getTime();
      const k = dateKey(d);
      const slots = schedule[k][sh] || [];
      const cell = document.createElement('div');
      cell.className = 'sg-cell' + (isToday?' is-today':'');
      slots.forEach((slot, si) => {
        const s = staff.find(x=>x.id===slot.staffId);
        if (!s) return;
        const def = SHIFT_DEF[sh];
        const showTime = (slot.from!==def.from || slot.to!==def.to);
        const chip = document.createElement('div');
        chip.className = 'chip ' + sh;
        chip.innerHTML = `<div class="chip-top">
          <span class="chip-name">${s.name.split(' ').pop()}</span>
          <button class="chip-rm" onclick="removeAssign('${k}','${sh}',${si})">✕</button>
        </div>${showTime ? `<div class="chip-time">${slot.from}–${slot.to}</div>` : ''}`;
        cell.appendChild(chip);
      });
      const addBtn = document.createElement('button');
      addBtn.className = 'add-slot';
      addBtn.textContent = '+ Thêm';
      addBtn.onclick = () => openAssignModal(k, sh);
      cell.appendChild(addBtn);
      row.appendChild(cell);
    });
  });
  updateStats();
}

function removeAssign(k, sh, idx) {
  schedule[k][sh].splice(idx, 1);
  renderWeek();
}

function openAssignModal(k, sh) {
  assignTarget = {k, sh};
  const def = SHIFT_DEF[sh];
  document.getElementById('inp-from').value = def.from;
  document.getElementById('inp-to').value = def.to;
  const already = (schedule[k][sh]||[]).map(x=>x.staffId);
  const sel = document.getElementById('inp-assign-staff');
  sel.innerHTML = staff.filter(s=>!already.includes(s.id))
    .map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  if (!sel.options.length) { alert('Tất cả nhân viên đã có trong ca này!'); return; }
  openModal('modal-assign');
}

function confirmAssign() {
  const sid = parseInt(document.getElementById('inp-assign-staff').value);
  const from = document.getElementById('inp-from').value;
  const to   = document.getElementById('inp-to').value;
  const {k, sh} = assignTarget;
  if (!schedule[k][sh]) schedule[k][sh] = [];
  schedule[k][sh].push({staffId:sid, from, to});
  closeModals(); renderWeek();
}

// ===================== RENDER MONTH =====================
function renderMonth() {
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth()+monthOffset, 1);
  document.getElementById('month-label').textContent = target.toLocaleDateString('vi-VN',{month:'long',year:'numeric'});
  const last = new Date(target.getFullYear(), target.getMonth()+1, 0).getDate();
  const grid = document.getElementById('month-grid');
  grid.innerHTML = '';
  ['T2','T3','T4','T5','T6','T7','CN'].forEach(h => {
    const el = document.createElement('div');
    el.className = 'month-day-hd'; el.textContent = h;
    grid.appendChild(el);
  });
  const startDay = new Date(target.getFullYear(), target.getMonth(), 1).getDay();
  for (let i=0; i<(startDay===0?6:startDay-1); i++) {
    const b = document.createElement('div'); grid.appendChild(b);
  }
  const today = new Date(); today.setHours(0,0,0,0);
  for (let d=1; d<=last; d++) {
    const date = new Date(target.getFullYear(), target.getMonth(), d);
    const k = dateKey(date);
    const isToday = date.getTime()===today.getTime();
    const total = SHIFTS.reduce((a,sh)=>a+(schedule[k]?schedule[k][sh].length:0), 0);
    const el = document.createElement('div');
    el.className = 'month-day' + (isToday?' is-today':'');
    el.innerHTML = `<div class="day-num">${d}</div>${total?`<div class="day-ca">${total} ca</div>`:''}`;
    grid.appendChild(el);
  }
}

// ===================== RENDER STAFF =====================
function renderStaff() {
  const c = document.getElementById('staff-grid');
  c.innerHTML = '';
  staff.forEach((s,i) => {
    const ci = i % AV_BG.length;
    const ini = s.name.split(' ').map(w=>w[0]).slice(-2).join('');
    const shifts = Object.values(schedule).reduce((a,day)=>
      a+SHIFTS.reduce((b,sh)=>b+(day[sh]||[]).filter(x=>x.staffId===s.id).length, 0), 0);
    const card = document.createElement('div');
    card.className = 'staff-card';
    card.innerHTML = `<div class="s-avatar" style="background:${AV_BG[ci]};color:${AV_TX[ci]}">${ini}</div>
      <div class="s-name">${s.name}</div>
      <div class="s-meta">${shifts} ca đã xếp</div>
      <button class="btn btn-danger" style="margin-top:10px;font-size:11px;padding:4px 10px" onclick="removeStaff(${s.id})">Xoá</button>`;
    c.appendChild(card);
  });
}

function removeStaff(id) {
  if (!confirm('Xoá nhân viên này?')) return;
  staff = staff.filter(s=>s.id!==id);
  Object.values(schedule).forEach(day => SHIFTS.forEach(sh => {
    day[sh] = (day[sh]||[]).filter(x=>x.staffId!==id);
  }));
  renderStaff(); renderWeek();
}

function updateStats() {
  document.getElementById('st-total').textContent = staff.length;
  const days = getWeekDays(weekOffset);
  let total=0, missing=0;
  days.forEach(d => {
    const k = dateKey(d);
    SHIFTS.forEach(sh => {
      const cnt = schedule[k]?schedule[k][sh].length:0;
      total += cnt; if (cnt<2) missing++;
    });
  });
  document.getElementById('st-shifts').textContent = total;
  document.getElementById('st-missing').textContent = missing;
}

// ===================== EXPORT ẢNH =====================
function openExport() {
  openModal('modal-export');
  document.getElementById('loading-msg').style.display = 'block';
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('download-link').style.display = 'none';

  // Build HTML bảng lịch để chụp
  const days = getWeekDays(weekOffset);
  const today = new Date(); today.setHours(0,0,0,0);

  // Tạo element ẩn để render
  const wrap = document.getElementById('print-canvas-wrap');
  wrap.innerHTML = '';

  const tbl = document.createElement('div');
  tbl.style.cssText = `
    width:900px; background:#fff; font-family:Arial,sans-serif;
    border-radius:0; overflow:hidden;
  `;

  // Header quán
  const hdr = document.createElement('div');
  hdr.style.cssText = 'background:#1a1a1a;color:#fff;padding:16px 20px;';
  hdr.innerHTML = `
    <div style="font-size:17px;font-weight:700;">☕ Lịch làm việc quán cafe</div>
    <div style="font-size:12px;color:#aaa;margin-top:4px;">Tuần: ${fmtDate(days[0])} – ${fmtDate(days[6])} &nbsp;|&nbsp; Tạo lúc: ${new Date().toLocaleString('vi-VN')}</div>`;
  tbl.appendChild(hdr);

  // Legend
  const leg = document.createElement('div');
  leg.style.cssText = 'display:flex;gap:20px;padding:10px 20px;background:#f8f8f8;border-bottom:1px solid #e0e0e0;flex-wrap:wrap;';
  leg.innerHTML = `
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#555">
      <span style="width:10px;height:10px;border-radius:2px;background:#EF9F27;display:inline-block"></span>Ca sáng 7:00–11:00</span>
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#555">
      <span style="width:10px;height:10px;border-radius:2px;background:#97C459;display:inline-block"></span>Ca chiều 13:00–17:00</span>
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#555">
      <span style="width:10px;height:10px;border-radius:2px;background:#85B7EB;display:inline-block"></span>Ca tối 18:00–22:00</span>`;
  tbl.appendChild(leg);

  // Table
  const table = document.createElement('table');
  table.style.cssText = 'width:100%;border-collapse:collapse;font-size:11px;';

  // THead
  const thead = document.createElement('thead');
  const trh = document.createElement('tr');
  trh.innerHTML = `<th style="background:#f0f0f0;padding:9px 8px;text-align:left;border:1px solid #ddd;width:90px;font-size:11px;color:#555">Ca</th>`;
  days.forEach(d => {
    const isT = d.getTime()===today.getTime();
    trh.innerHTML += `<th style="background:${isT?'#dbeeff':'#f0f0f0'};padding:9px 5px;text-align:center;border:1px solid #ddd;color:${isT?'#185FA5':'#333'};font-size:11px;">
      ${DAYS_SHORT[d.getDay()]}<br/><span style="font-weight:400">${d.getDate()}/${d.getMonth()+1}</span></th>`;
  });
  thead.appendChild(trh); table.appendChild(thead);

  // TBody
  const tbody = document.createElement('tbody');
  const shiftColors = {
    morning:  {bg:'#FAEEDA', tx:'#854F0B', rowBg:'#fffbf5', labelBg:'#fdf0d5'},
    afternoon:{bg:'#EAF3DE', tx:'#3B6D11', rowBg:'#f7fbf2', labelBg:'#dff0c5'},
    evening:  {bg:'#E6F1FB', tx:'#185FA5', rowBg:'#f4f9ff', labelBg:'#c8e0f8'},
  };
  SHIFTS.forEach(sh => {
    const sc = shiftColors[sh];
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="background:${sc.labelBg};padding:10px 8px;border:1px solid #ddd;font-weight:700;color:${sc.tx};vertical-align:top;">
      ${SHIFT_LABEL[sh]}<br/><span style="font-size:9px;font-weight:400;color:#999">${SHIFT_TIME[sh]}</span></td>`;
    days.forEach(d => {
      const k = dateKey(d);
      const slots = (schedule[k]&&schedule[k][sh]) || [];
      const isT = d.getTime()===today.getTime();
      let inner = '';
      if (!slots.length) {
        inner = `<span style="color:#ccc;font-size:10px;">–</span>`;
      } else {
        slots.forEach(slot => {
          const s = staff.find(x=>x.id===slot.staffId);
          if (!s) return;
          const def = SHIFT_DEF[sh];
          const showTime = (slot.from!==def.from||slot.to!==def.to);
          inner += `<div style="background:${sc.bg};color:${sc.tx};border-radius:3px;padding:3px 6px;margin:2px 0;font-size:10px;font-weight:600;display:inline-block;">
            ${s.name.split(' ').pop()}${showTime?`<br/><span style="font-size:9px;font-weight:400;opacity:.8">${slot.from}–${slot.to}</span>`:''}
          </div> `;
        });
      }
      tr.innerHTML += `<td style="background:${isT?'rgba(24,95,165,0.04)':sc.rowBg};padding:8px 5px;border:1px solid #ddd;vertical-align:top;text-align:center;min-height:70px">${inner}</td>`;
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tbl.appendChild(table);

  // Footer
  const foot = document.createElement('div');
  foot.style.cssText = 'background:#fafafa;border-top:1px solid #e0e0e0;padding:8px 20px;font-size:10px;color:#aaa;text-align:right;';
  foot.textContent = `Lịch làm việc quán cafe – Xuất ${new Date().toLocaleString('vi-VN')}`;
  tbl.appendChild(foot);

  wrap.appendChild(tbl);

  // Chụp ảnh bằng html2canvas
  setTimeout(() => {
    html2canvas(tbl, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
    }).then(canvas => {
      const dataUrl = canvas.toDataURL('image/png');
      const img = document.getElementById('preview-img');
      img.src = dataUrl;
      img.style.display = 'block';
      document.getElementById('loading-msg').style.display = 'none';

      // Gán link tải
      const dl = document.getElementById('download-link');
      const fname = `lich-lam-viec-${fmtDate(days[0]).replace(/\//g,'-')}_den_${fmtDate(days[6]).replace(/\//g,'-')}.png`;
      dl.href = dataUrl;
      dl.download = fname;
      dl.style.display = 'inline-block';
    }).catch(err => {
      console.error(err);
      document.getElementById('loading-msg').textContent = 'Lỗi tạo ảnh. Vui lòng thử lại!';
    });
  }, 100);
}

// ===================== MODAL & NAV =====================
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModals() {
  document.querySelectorAll('.overlay').forEach(e => e.classList.remove('open'));
}
// Click overlay ngoài để đóng
document.querySelectorAll('.overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModals(); });
});

function addStaff() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { alert('Vui lòng nhập tên!'); return; }
  staff.push({id: nextId++, name});
  closeModals(); renderStaff();
}

function prevWeek() { weekOffset--; renderWeek(); }
function nextWeek() { weekOffset++; renderWeek(); }
function prevMonth() { monthOffset--; renderMonth(); }
function nextMonth() { monthOffset++; renderMonth(); }

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-week').style.display  = tab==='week'  ? 'block' : 'none';
  document.getElementById('view-month').style.display = tab==='month' ? 'block' : 'none';
  document.getElementById('view-staff').style.display = tab==='staff' ? 'block' : 'none';
  if (tab==='month') renderMonth();
  if (tab==='staff') renderStaff();
}

// ===================== INIT =====================
renderWeek();
</script>
